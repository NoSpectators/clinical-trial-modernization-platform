version: '3.9'

services:

  postgres:
    image: postgres:15

    container_name: clinical_postgres

    environment:
      POSTGRES_USER: clinical_user
      POSTGRES_PASSWORD: clinical_password
      POSTGRES_DB: clinical_trials

    ports:
      - "5433:5432" # avoid conflict with host machine (Maps host port 5433 to container port 5432)

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: